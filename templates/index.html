<!DOCTYPE html>
<html lang="ru">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Course Advisor</title>

    <style>

        body{
            font-family: Arial;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
        }

        button{
            padding:12px 20px;
            cursor:pointer;
        }

        .course{
            border:1px solid #ddd;
            padding:15px;
            margin-top:15px;
            border-radius:8px;
        }

    </style>
</head>

<body>

<h1>Информационно-советующая система выбора курсов</h1>

<form action="/recommend" method="post">

    <label>Ваш запрос</label>

    <input
        type="text"
        name="query"
        placeholder="Например: хочу стать дата аналитиком"
        required
    >

    <label>Количество рекомендаций</label>

    <input
        type="number"
        name="top_k"
        value="5"
    >

    <button type="submit">
        Подобрать курсы
    </button>

</form>

{% if results %}

<hr>

<h2>Результаты</h2>

{% for course in results %}

<div class="course">

    <h3>{{ course.title }}</h3>

    <p>
        <b>Категория:</b>
        {{ course.category }}
    </p>

    <p>
        <b>Рейтинг:</b>
        {{ "%.3f"|format(course.final_score) }}
    </p>

    <p>
        <a href="{{ course.url }}"
           target="_blank">
           Открыть курс
        </a>
    </p>

</div>

{% endfor %}

{% endif %}

</body>
</html>
